[mypy]
# ─────────────────────────────────────────────────────────────────────────────
# mypy.ini — Strict type-checking configuration for the Lead Management Worker.
#
# Rationale: Autonomous AI agents are highly non-deterministic. Strict typing is
# the best static defense against runtime AttributeErrors when parsing LLM JSON
# or tool outputs of unknown shape. Catch type bugs at CI time, not in production.
# ─────────────────────────────────────────────────────────────────────────────

python_version = 3.11

# ── Strictness flags ──────────────────────────────────────────────────────────
disallow_untyped_defs = True          # Every function must have full type annotations
disallow_incomplete_defs = True       # Partial annotations count as no annotation
check_untyped_defs = True             # Also checks unannotated code bodies
disallow_untyped_decorators = True    # Decorators must be typed too

no_implicit_optional = True           # Optional[X] must be explicit, not X = None
warn_return_any = True                # Warn when a typed function returns Any
warn_redundant_casts = True           # Flag unnecessary cast() calls
warn_unused_ignores = True            # Flag # type: ignore that are no longer needed
warn_unused_configs = True            # Flag unused [mypy-...] section entries

strict_equality = True                # == checks must be same type (no implicit coerce)
extra_checks = True                   # Enable additional checks (e.g. TypeVar constraints)

# ── Error reporting ───────────────────────────────────────────────────────────
show_error_codes = True               # Show error code (e.g. [assignment]) alongside message
pretty = True                         # Human-readable output in terminal

# ── Paths ─────────────────────────────────────────────────────────────────────
files = app/                          # Only check application code, not tests or venv

# ── Third-party library stubs ─────────────────────────────────────────────────
# These libraries don't ship their own type stubs; tell mypy to ignore missing stubs.
[mypy-loguru.*]
ignore_missing_imports = True

[mypy-pybreaker.*]
ignore_missing_imports = True

[mypy-tenacity.*]
ignore_missing_imports = True

[mypy-langgraph.*]
ignore_missing_imports = True

[mypy-langchain.*]
ignore_missing_imports = True

[mypy-langchain_core.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-psycopg2.*]
ignore_missing_imports = True
