# ─────────────────────────────────────────────────────────────────────────────
# mypy.ini — type-checking configuration for the Lead Management Worker.
#
# NOTE: INI values must NOT carry inline "#" comments — mypy's parser treats the
# rest of the line as part of the value (e.g. `True   # note` → "Not a boolean").
# Keep every comment on its own line, above the option it documents.
#
# Rationale: Autonomous AI agents are highly non-deterministic. Static typing is
# a cheap defense against runtime AttributeErrors when parsing LLM JSON or tool
# outputs of unknown shape. Catch type bugs at CI time, not in production.
# ─────────────────────────────────────────────────────────────────────────────

[mypy]
python_version = 3.11

# Load the Pydantic v2 plugin so BaseModel fields with defaults (e.g. Field(None))
# are understood as optional rather than reported as missing constructor args.
plugins = pydantic.mypy

# ── Strictness flags ──
# Every function must have full type annotations.
disallow_untyped_defs = True
# Partial annotations count as no annotation.
disallow_incomplete_defs = True
# Also type-check the bodies of unannotated functions.
check_untyped_defs = True
# Optional[X] must be explicit, not inferred from `X = None`.
no_implicit_optional = True
# Warn when a typed function returns Any.
warn_return_any = True
# Flag unnecessary cast() calls.
warn_redundant_casts = True
# Flag `# type: ignore` comments that are no longer needed.
warn_unused_ignores = True
# Flag unused [mypy-...] section entries.
warn_unused_configs = True
# `==` checks must be between compatible types.
strict_equality = True

# ── Error reporting ──
show_error_codes = True
pretty = True

# ── Paths ──
# Only check application code, not tests or the virtualenv.
files = app/

# ── Third-party libraries without type stubs ──
[mypy-loguru.*]
ignore_missing_imports = True

[mypy-pybreaker.*]
ignore_missing_imports = True

[mypy-tenacity.*]
ignore_missing_imports = True

[mypy-langgraph.*]
ignore_missing_imports = True

[mypy-langchain.*]
ignore_missing_imports = True

[mypy-langchain_core.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-psycopg2.*]
ignore_missing_imports = True

[mypy-jose.*]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True
