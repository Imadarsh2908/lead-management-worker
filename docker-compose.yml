services:
  # ============================================================
  # FastAPI Application (the Lead Management AI Worker)
  # ============================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lead_agent_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override to use Docker internal hostnames instead of localhost
      - DATABASE_URL=postgresql://agentuser:agentpassword@db:5432/leadagentdb
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # Bind-mount (not baked into the image) so editing AGENTS.md on the host
      # changes agent scoring behavior in the RUNNING container immediately —
      # no image rebuild, no container restart. llm_scorer.get_system_prompt()
      # already re-reads the file on mtime change; this just extends that same
      # hot-reload story across the container boundary. Read-only: the app
      # only ever reads its own prompt, never writes it.
      - ./AGENTS.md:/app/AGENTS.md:ro
    healthcheck:
      # Ensures the container is marked healthy only when FastAPI is actually responding
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy  # Wait for Postgres to be fully ready
      redis:
        condition: service_healthy  # Wait for Redis to be fully ready
    networks:
      - agent_network

  # ============================================================
  # PostgreSQL Database (Persistent Storage + Audit Logs)
  # ============================================================
  db:
    image: postgres:15-alpine
    container_name: lead_agent_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=agentuser
      - POSTGRES_PASSWORD=agentpassword
      - POSTGRES_DB=leadagentdb
    ports:
      - "5432:5432"
    volumes:
      # Named volume ensures data survives container rebuilds
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready checks that Postgres is accepting connections
      test: ["CMD-SHELL", "pg_isready -U agentuser -d leadagentdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent_network

  # ============================================================
  # Redis Stack (LangGraph Workflow Checkpointing)
  # NOTE: LangGraph's RedisSaver needs the RediSearch + RedisJSON modules, which
  # plain `redis:7-alpine` does NOT ship. `redis/redis-stack-server` bundles them.
  # We pass persistence args via REDIS_ARGS (NOT a `command:` override) so the
  # image still loads its modules — overriding `command` with plain redis-server
  # would silently disable Search/JSON and break the checkpointer.
  # ============================================================
  redis:
    image: redis/redis-stack-server:latest
    container_name: lead_agent_redis
    restart: unless-stopped
    environment:
      # --appendonly yes = AOF persistence so checkpoints survive restarts
      - REDIS_ARGS=--appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent_network

# Named volumes persist data across container lifecycle events
volumes:
  pg_data:
  redis_data:

# Isolated bridge network prevents unintended access from other Docker projects
networks:
  agent_network:
    driver: bridge
