[alembic]
# Path to migration scripts
script_location = alembic

# Prepend the directory containing this file (the repo root, where the `app`
# package lives) to sys.path before loading env.py. Without this, invoking
# the bare `alembic` console script (as opposed to `python -m alembic`) does
# NOT put the cwd on sys.path, so `from app.core.config import settings` in
# env.py fails with ModuleNotFoundError: No module named 'app'.
prepend_sys_path = .

# Template for new migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for file timestamps
timezone = UTC

# Max length of slug in file name
truncate_slug_length = 40

# Alembic logs config
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
